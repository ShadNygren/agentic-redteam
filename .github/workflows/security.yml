# Agentic Redteam(TM) — SBOM + vulnerability scan (Syft + Grype, NOT Trivy).
# Trivy/aquasecurity actions are deliberately avoided (TeamPCP supply-chain compromise, March 2026).
# Copyright (c) 2026 Shad Nygren / Virtual Hipster Corporation · Apache-2.0 License
name: security

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'   # weekly Monday — catch newly-disclosed CVEs in the base image/tools

permissions:
  contents: read
  security-events: write   # upload SARIF to the Security tab

jobs:
  sbom-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the lean CI image (kali-tools-top10) to scan — fast + representative of the toolchain.
      - name: Build image to scan
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: agentic-redteam:scan
          build-args: |
            TOOLSET=kali-tools-top10
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM — CycloneDX (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: agentic-redteam:scan
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom-cyclonedx.json

      - name: Generate SBOM — SPDX (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: agentic-redteam:scan
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom-spdx.json

      # Grype is the Trivy replacement. fail-build:false so a security-tooling image full of
      # "vulnerable by design" packages doesn't perma-red CI; findings still land in the Security tab.
      - name: Vulnerability scan (Grype)
        id: grype
        uses: anchore/scan-action@v7
        with:
          image: agentic-redteam:scan
          fail-build: false
          severity-cutoff: high
          output-format: sarif

      - name: Upload scan results to the Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype
