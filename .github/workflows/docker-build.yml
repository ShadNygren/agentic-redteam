name: docker-build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # CI builds the LEAN toolset (kali-tools-top10) for speed + reliability:
      # it validates the Dockerfile, Claude Code, the skill, and the scope guard
      # on every push. The full kali-linux-headless image is built on release /
      # locally (see the publish job below).
      - name: Build image (lean toolset for CI)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: agentic-redteam:ci
          build-args: |
            TOOLSET=kali-tools-top10
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: docker run --rm agentic-redteam:ci bash /opt/agentic-redteam/tests/smoke-test.sh

  # ---------------------------------------------------------------------------
  # Publish the FULL image (kali-linux-headless) to GHCR. Disabled by default:
  # enable once the repo is public (or configure GHCR auth for a private repo).
  # Uncomment the `if:` line's value change and the steps to turn it on.
  # ---------------------------------------------------------------------------
  publish:
    if: ${{ false }}            # set to: github.ref == 'refs/heads/main' to enable
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space (headless toolset is large)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (full headless toolset)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          build-args: |
            TOOLSET=kali-linux-headless
            KALI_TAG=kali-last-release
          cache-from: type=gha
          cache-to: type=gha,mode=max
